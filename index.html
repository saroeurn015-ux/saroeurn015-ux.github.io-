<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Love Me?</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffeef2;
            font-family: 'Khmer OS Battambang', sans-serif;
            overflow: hidden;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10;
        }
        h1 { color: #d63384; font-size: 28px; }
        .buttons { margin-top: 30px; position: relative; }
        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            margin: 10px;
        }
        #yesBtn { background-color: #ff4d6d; color: white; }
        #noBtn { background-color: #6c757d; color: white; position: absolute; }
        
        /* Effect បេះដូង */
        .heart {
            position: fixed;
            top: -10px;
            color: #ff4d6d;
            font-size: 20px;
            animation: fall linear forwards;
            z-index: 1;
        }
        @keyframes fall {
            to { transform: translateY(105vh); }
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <h1 id="question">តើអ្នកស្រឡាញ់ខ្ញុំទេ? ❤️</h1>
    <div class="buttons">
        <button id="yesBtn" onclick="sayYes()">បាទ/ចាស</button>
        <button id="noBtn" onmouseover="moveButton()">ទេ</button>
    </div>
</div>

<script>
    // បង្កើតបេះដូងហោះ
    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerHTML = '❤️';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = Math.random() * 3 + 2 + 's';
        heart.style.opacity = Math.random();
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }
    setInterval(createHeart, 300);

    // ឱ្យប៊ូតុង "ទេ" រត់គេច
    function moveButton() {
        const noBtn = document.getElementById('noBtn');
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);
        noBtn.style.left = x + 'px';
        noBtn.style.top = y + 'px';
    }

    // នៅពេលចុច Yes
    function sayYes() {
        document.getElementById('mainContainer').innerHTML = `
            <h1 style="font-size: 50px;">Yay! 🥰</h1>
            <p style="font-size: 20px;">ខ្ញុំក៏ស្រឡាញ់អ្នកដែរ!</p>
            <div style="font-size: 60px;">💖🌸✨</div>
        `;
    }
</script>

</body>
</html>
